name: CI/CD — RAG Knowledge Assistant

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  IMAGE_NAME: rag-knowledge-assistant

jobs:
  # ── Lint + Test ─────────────────────────────────────────────────────────────
  test:
    name: Lint and test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install ruff pytest pytest-asyncio httpx
          # Install lightweight subset for tests (no GPU libs)
          pip install langchain langchain-community langchain-core \
                      chromadb sentence-transformers pydantic python-dotenv \
                      loguru tiktoken pypdf python-docx beautifulsoup4 requests \
                      langchain-text-splitters "unstructured>=0.16.19"

      - name: Lint with ruff
        run: ruff check . --select E,F,W --ignore E501

      - name: Run tests
        env:
          VECTOR_DB: chroma
          EMBEDDING_PROVIDER: huggingface
          EMBEDDING_MODEL: all-MiniLM-L6-v2
          LLM_PROVIDER: anthropic
          USE_RERANKER: "false"
          APP_ENV: development
        run: |
          pytest tests/ -v --tb=short

  # ── Build Docker image ───────────────────────────────────────────────────────
  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest
            ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy to AWS Lambda ─────────────────────────────────────────────────────
  deploy:
    name: Deploy to AWS Lambda
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Push to ECR and update Lambda
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPO: ${{ env.IMAGE_NAME }}
          SHA: ${{ github.sha }}
        run: |
          docker pull ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:$SHA
          docker tag ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:$SHA \
            $ECR_REGISTRY/$ECR_REPO:$SHA
          docker push $ECR_REGISTRY/$ECR_REPO:$SHA

          aws lambda update-function-code \
            --function-name rag-knowledge-assistant \
            --image-uri $ECR_REGISTRY/$ECR_REPO:$SHA

      - name: Wait for update and verify health
        run: |
          aws lambda wait function-updated \
            --function-name rag-knowledge-assistant
          echo "Deployment complete"
