name: Trigger auto deployment for ragassistant-1

on:
  push:
    branches:
      - main
    paths:
      - '**'
      - '.github/workflows/ragassistant-1-AutoDeployTrigger-caba34b3-1278-4894-8fe3-846cf171a91f.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Required for OIDC JWT Token
      contents: read # Required to checkout the repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v3

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.RAGASSISTANT1_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.RAGASSISTANT1_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.RAGASSISTANT1_AZURE_SUBSCRIPTION_ID }}

      - name: Log in to Azure Container Registry
        run: |
          TOKEN=$(az acr login --name ragknowledge --expose-token --output tsv --query accessToken)
          echo "$TOKEN" | docker login ragknowledge.azurecr.io --username 00000000-0000-0000-0000-000000000000 --password-stdin

      - name: Build Docker Image
        run: |
          docker build -t ragknowledge.azurecr.io/rag-streamlit-ui:${{ github.sha }} -f Dockerfile.ui .

      - name: Push Docker Image to ACR
        run: |
          docker push ragknowledge.azurecr.io/rag-streamlit-ui:${{ github.sha }}

      - name: Deploy to Azure Container App
        run: |
          az extension add --name containerapp --yes
          
          # Enable admin credentials on the registry
          az acr update --name ragknowledge --admin-enabled true
          
          # Fetch credentials
          ACR_USER=$(az acr credential show --name ragknowledge --query username --output tsv)
          ACR_PASS=$(az acr credential show --name ragknowledge --query "passwords[0].value" --output tsv)
          
          # Link the registry credentials to the Container App
          az containerapp registry set \
            --name ragassistant-1 \
            --resource-group rg-rag-assistant \
            --server ragknowledge.azurecr.io \
            --username "$ACR_USER" \
            --password "$ACR_PASS"
            
          # Deploy the updated image
          az containerapp update \
            --name ragassistant-1 \
            --resource-group rg-rag-assistant \
            --image ragknowledge.azurecr.io/rag-streamlit-ui:${{ github.sha }}
