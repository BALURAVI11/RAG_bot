name: Trigger auto deployment for ragassistant-1

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/ragassistant-1-AutoDeployTrigger-caba34b3-1278-4894-8fe3-846cf171a91f.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.RAGASSISTANT1_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.RAGASSISTANT1_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.RAGASSISTANT1_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: 
          registryUsername: ${{ secrets.RAGASSISTANT1_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.RAGASSISTANT1_REGISTRY_PASSWORD }}
          containerAppName: ragassistant-1
          resourceGroup: rg-rag-assistant
          imageToBuild: default/[parameters('containerAppName')]:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


