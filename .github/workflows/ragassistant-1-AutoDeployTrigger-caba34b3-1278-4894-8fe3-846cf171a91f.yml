name: Trigger auto deployment for ragassistant-1

on:
  push:
    branches:
      - main
    paths:
      - '**'
      - '.github/workflows/ragassistant-1-AutoDeployTrigger-caba34b3-1278-4894-8fe3-846cf171a91f.yml'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Required for OIDC JWT Token
      contents: read # Required to checkout the repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v3

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.RAGASSISTANT1_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.RAGASSISTANT1_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.RAGASSISTANT1_AZURE_SUBSCRIPTION_ID }}

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ragknowledge.azurecr.io
          username: ${{ secrets.RAGASSISTANT1_REGISTRY_USERNAME }}
          password: ${{ secrets.RAGASSISTANT1_REGISTRY_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t ragknowledge.azurecr.io/rag-streamlit-ui:${{ github.sha }} -f Dockerfile.ui .

      - name: Push Docker Image to ACR
        run: |
          docker push ragknowledge.azurecr.io/rag-streamlit-ui:${{ github.sha }}

      - name: Deploy to Azure Container App
        uses: azure/CLI@v1
        with:
          inlineScript: |
            az extension add --name containerapp --yes
            az containerapp update \
              --name ragassistant-1 \
              --resource-group rg-rag-assistant \
              --image ragknowledge.azurecr.io/rag-streamlit-ui:${{ github.sha }}
